<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生报名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            color: #999;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-group input::placeholder {
            color: #ccc;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-submit:active {
            transform: translateY(0);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 15px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: rgba(46, 125, 50, 0.9);
        }
        .toast.error {
            background: rgba(211, 47, 47, 0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>学生报名</h1>
            <p>填写信息完成报名</p>
        </div>
        <form id="signupForm">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" placeholder="请输入姓名" required>
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" placeholder="请输入手机号" required>
            </div>
            <div class="form-group">
                <label for="age">年龄</label>
                <input type="number" id="age" placeholder="请输入年龄" required>
            </div>
            <div class="form-group">
                <label for="hukou">户口地址</label>
                <input type="text" id="hukou" placeholder="请输入户口地址" required>
            </div>
            <div class="form-group">
                <label for="school">学校</label>
                <input type="text" id="school" placeholder="请输入学校名称" required>
            </div>
            <button type="submit" class="btn-submit">提交报名</button>
        </form>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const form = document.getElementById('signupForm');
        const toast = document.getElementById('toast');

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 2000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = form.querySelector('.btn-submit');
            btn.disabled = true;
            btn.textContent = '提交中...';

            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                age: parseInt(document.getElementById('age').value),
                hukou: document.getElementById('hukou').value,
                school: document.getElementById('school').value
            };

            try {
                const response = await fetch('http://localhost:8080/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showToast(result.message, 'success');
                    form.reset();
                } else {
                    showToast(result.error || '报名失败', 'error');
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '提交报名';
            }
        });
    </script>
</body>
</html>
